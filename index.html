<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CameraRay - Eye Tracking Path Tracer</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- MediaPipe Vision -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js" crossorigin="anonymous"></script>
</head>
<body>
    <!-- WebGPU Canvas -->
    <canvas id="webgpu-canvas"></canvas>

    <!-- UI Overlay -->
    <div id="ui-container">
        <h1>CameraRay</h1>
        <p>Dynamic WebGPU Path Tracer</p>
        
        <div class="status-panel">
            <div id="status-text">Loading Face Landmarker...</div>
            <div class="metrics">
                <div class="metric">
                    <span class="label">Light X</span>
                    <span id="metric-x" class="value">0.00</span>
                </div>
                <div class="metric">
                    <span class="label">Light Y</span>
                    <span id="metric-y" class="value">0.00</span>
                </div>
                <div class="metric">
                    <span class="label">Distance</span>
                    <span id="metric-z" class="value">0.00</span>
                </div>
            </div>
            <button id="start-btn" disabled>Start Camera</button>
            <button id="mode-btn" style="margin-top: 10px; background-color: #8b5cf6;">Switch to Ray Tracing</button>
        </div>

        <div class="video-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="debug-canvas"></canvas>
        </div>
    </div>

    <!-- Main Application Script -->
    <script type="module" src="main.js"></script>
</body>
</html>
