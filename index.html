<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CameraRay - Eye Tracking Path Tracer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- WebGPU Canvas -->
    <canvas id="webgpu-canvas"></canvas>

    <!-- Game UI Overlay -->
    <div id="game-ui-container">
        <div id="score-display">Score: <span id="score-value">0</span></div>
        <div id="health-bar-container">
            <div id="health-bar"></div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" style="display: none;">
        <h2>GAME OVER</h2>
        <p>Final Score: <span id="final-score">0</span></p>
        <p class="blink">Press ENTER to Restart</p>
    </div>

    <!-- UI Overlay -->
    <div id="ui-container">
        <h1>CameraRay</h1>
        <p>Dynamic WebGPU Path Tracer</p>
        
        <div class="status-panel">
            <div id="status-text">Loading Face Landmarker...</div>
            <div class="metrics">
                <div class="metric">
                    <span class="label">Light X</span>
                    <span id="metric-x" class="value">0.00</span>
                </div>
                <div class="metric">
                    <span class="label">Light Y</span>
                    <span id="metric-y" class="value">0.00</span>
                </div>
                <div class="metric">
                    <span class="label">Distance</span>
                    <span id="metric-z" class="value">0.00</span>
                </div>
            </div>
            <button id="start-btn" disabled>Start Camera</button>
        </div>

        <div class="video-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="debug-canvas"></canvas>
        </div>
    </div>

    <!-- Main Application Script -->
    <script type="module" src="main.js"></script>
</body>
</html>
